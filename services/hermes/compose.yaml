name: hermes

services:
  dind:
    image: docker:27-dind
    container_name: docker
    hostname: docker
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - dind-data:/var/lib/docker
      - dind-certs:/certs
    restart: unless-stopped

  honcho_api:
    container_name: honcho_api
    build:
      context: ./honcho-src
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      honcho_database:
        condition: service_healthy
      honcho_redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:postgres@honcho_database:5432/postgres
      - CACHE_URL=redis://honcho_redis:6379/0?suppress=true
      - CACHE_ENABLED=true
    env_file:
      - path: ./honcho-src/.env
        required: false
    restart: unless-stopped

  honcho_deriver:
    container_name: honcho_deriver
    build:
      context: ./honcho-src
      dockerfile: Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      honcho_database:
        condition: service_healthy
      honcho_redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:postgres@honcho_database:5432/postgres
      - CACHE_URL=redis://honcho_redis:6379/0?suppress=true
      - CACHE_ENABLED=true
    env_file:
      - path: ./honcho-src/.env
        required: false
    restart: unless-stopped

  honcho_database:
    container_name: honcho_database
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./honcho-src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - honcho_pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  honcho_redis:
    container_name: honcho_redis
    image: redis:8.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - honcho_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  hermes:
    # image: nousresearch/hermes-agent:latest
    build: ./core-src
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    environment:
      TZ: Asia/Manila
      DOCKER_HOST: tcp://docker:2376
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /certs/client
    volumes:
      - ./data:/opt/data
      - ./core-src:/opt/hermes
      - dind-certs:/certs:ro
    depends_on:
      - dind

volumes:
  dind-data:
  dind-certs:
  honcho_pgdata:
  honcho_redis_data: