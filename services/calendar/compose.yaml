name: calendar

x-ics-sync: &ics-sync
  build: ./sync-ics
  depends_on:
    - radicale
  restart: unless-stopped
  environment:
    SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-1800}
    RADICALE_USER: ${RADICALE_USER:-}
    RADICALE_PASSWORD: ${RADICALE_PASSWORD:-}
    RADICALE_BASE_URL: ${RADICALE_BASE_URL:-http://radicale:5232}
  command: ["/bin/sh", "/sync.sh"]

services:

  radicale:
    container_name: radicale
    image: 11notes/radicale:3
    read_only: true
    security_opt:
      - "no-new-privileges=true"
    volumes:
      - ./radicale/etc:/radicale/etc
      - ./radicale/var:/radicale/var
    # Local debug only; prefer https://<host>/calendar/ via nginx (ports 80/443).
    ports:
      - "127.0.0.1:5232:5232"
    restart: unless-stopped

  sync-astra:
    container_name: sync-astra
    build: ./sync-google
    depends_on:
      - radicale
    restart: unless-stopped
    environment:
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-1800}
      OAUTH_PORT: "8090"
      RADICALE_USER: ${RADICALE_USER:-}
      RADICALE_PASSWORD: ${RADICALE_PASSWORD:-}
      RADICALE_BASE_URL: ${RADICALE_BASE_URL:-http://radicale:5232}
    volumes:
      - ./data/sync-astra:/data
      - ./credentials/google-oauth-client.json:/credentials/google-oauth-client.json:ro

  sync-tonic:
    <<: *ics-sync
    container_name: sync-tonic
    volumes:
      - ./sync-ics/sync.sh:/sync.sh:ro
      - ./data/sync-tonic:/data

  sync-personal:
    <<: *ics-sync
    container_name: sync-personal
    volumes:
      - ./sync-ics/sync.sh:/sync.sh:ro
      - ./data/sync-personal:/data
