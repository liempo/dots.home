# Radicale v3 — loaded by 11notes/radicale as /radicale/etc/default.conf
# See https://radicale.org/v3.html#configuration

[server]
# Bind all interfaces so the container is reachable (default is localhost-only).
hosts = 0.0.0.0:5232, [::]:5232

[auth]
type = none
htpasswd_filename = /radicale/etc/users
htpasswd_encryption = autodetect

[storage]
filesystem_folder = /radicale/var

[rights]
# Content supplied at container start via RADICALE_RIGHTS in calendar/compose.yaml
type = from_file
file = /radicale/etc/rights

[logging]
level = info

