name: calendar

x-sync-env: &sync-env
  SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-1800}
  RADICALE_USER: ${RADICALE_USER:-}
  RADICALE_PASSWORD: ${RADICALE_PASSWORD:-}
  RADICALE_BASE_URL: http://radicale:5232

x-calendar-sync: &calendar-sync
  build: ./sync
  depends_on:
    - radicale
  restart: unless-stopped
  environment:
    <<: *sync-env

services:

  radicale:
    container_name: radicale
    image: 11notes/radicale:3
    read_only: true
    security_opt:
      - "no-new-privileges=true"
    volumes:
      - ~/.calendar/radicale/etc:/radicale/etc
      - ~/.calendar/radicale/var:/radicale/var
    ports:
      - "127.0.0.1:5232:5232"
    restart: unless-stopped

  radicale-mcp:
    container_name: radicale-mcp
    image: python:3.12-slim
    depends_on:
      - radicale
    restart: unless-stopped
    environment:
      CALDAV_SERVER_URL: "http://radicale:5232"
      CALDAV_USERNAME: ${RADICALE_USER:-}
      CALDAV_PASSWORD: ${RADICALE_PASSWORD:-}
      CALDAV_USE_SSL: "false"
      LOG_LEVEL: "INFO"
    command: >
      sh -lc
      "apt-get update
      && apt-get install -y --no-install-recommends git
      && rm -rf /var/lib/apt/lists/*
      && pip install --no-cache-dir git+https://github.com/TheGreatGooo/radicale-mcp.git
      && python -c 'from server import mcp; mcp.run(transport=\"http\", host=\"0.0.0.0\", port=8000)'"
    ports:
      - "8799:8000"

  sync-personal:
    <<: *calendar-sync
    container_name: sync-personal
    volumes:
      - ~/.calendar/data/personal:/data

  sync-astra:
    <<: *calendar-sync
    container_name: sync-astra
    environment:
      <<: *sync-env
      OAUTH_PORT: "8090"
      GOOGLE_CREDENTIALS_PATH: "/credentials/google-oauth-client.json"
      GOOGLE_TOKEN_PATH: "/data/token.json"
    volumes:
      - ~/.calendar/data/astra:/data
      - ~/.calendar/credentials:/credentials:ro

  sync-tonic:
    <<: *calendar-sync
    container_name: sync-tonic
    volumes:
      - ~/.calendar/data/tonic:/data

