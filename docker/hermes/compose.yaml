# HERMES_UID / HERMES_GID align ~/.hermes bind-mount ownership with this host user (1000:100).
# Host /box (NixOS fileSystems."/box") is bind-mounted at /box in hermes + dashboard.
# Honcho runs as a separate stack (`docker/honcho`); Hermes reaches it on `mcp-net` as `honcho_api`.
name: hermes

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      - ~/.hermes:/opt/data
      - /box:/box
    environment:
      HERMES_UID: "1000"
      HERMES_GID: "100"
    networks:
      - default
      - mcp-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0 --insecure --tui
    ports:
      - "9119:9119"
    volumes:
      - ~/.hermes:/opt/data
      - /box:/box
    environment:
      HERMES_UID: "1000"
      HERMES_GID: "100"
      GATEWAY_HEALTH_URL: http://hermes:8642
    depends_on:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  mcp-net:
    name: mcp-net
    driver: bridge
