name: calendar

x-calendar-env: &calendar-env
  env_file:
    - ${HOME}/.calendar/radicale/.env

services:

  radicale:
    container_name: radicale
    image: 11notes/radicale:3
    read_only: true
    security_opt:
      - "no-new-privileges=true"
    volumes:
      - ${HOME}/.calendar/radicale/etc:/radicale/etc
      - ${HOME}/.calendar/radicale/var:/radicale/var
    ports:
      - "127.0.0.1:5232:5232"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',5232)); s.close()",
        ]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s

  chronos-mcp:
    container_name: chronos-mcp
    image: python:3.12-slim
    <<: *calendar-env
    depends_on:
      radicale:
        condition: service_healthy
    restart: unless-stopped
    environment:
      FASTMCP_CHECK_FOR_UPDATES: "off"
    volumes:
      - ${HOME}/.calendar/chronos/accounts.json:/root/.chronos/accounts.json:ro
    command:
      - sh
      - -c
      - >-
        apt-get update &&
        apt-get install -y --no-install-recommends git &&
        rm -rf /var/lib/apt/lists/* &&
        pip install --no-cache-dir 'git+https://github.com/democratize-technology/chronos-mcp.git' &&
        exec python -c 'from chronos_mcp.server import mcp; mcp.run(transport="streamable-http", host="0.0.0.0", port=8000)'
    networks:
      - default
      - mcp-net


  radicalize:
    container_name: radicalize
    build:
      context: ./radicalize
      dockerfile: Dockerfile
    image: radicalize:local
    depends_on:
      radicale:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - mcp-net
    environment:
      RADICALIZE_DATA: /data/calendar
      RADICALE_BASE_URL: http://radicale:5232
      RADICALIZED_UID: "${RADICALIZED_UID:-1000}"
      RADICALIZED_GID: "${RADICALIZED_GID:-100}"
    command: ["run", "--data-dir", "/data/calendar"]
    volumes:
      - ${HOME}/.calendar/radicalize:/data/calendar
      - ${HOME}/.calendar/radicale/.env:/data/calendar/.env
      # Writable bind (like .env): entrypoint `chown -R` on RADICALIZE_DATA includes credentials/.
      - ${HOME}/.calendar/google/oauth.json:/data/calendar/credentials/google-oauth-client.json

networks:
  mcp-net:
    name: mcp-net
    driver: bridge
