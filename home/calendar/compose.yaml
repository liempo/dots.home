name: calendar

# Radicale + per-calendar JSON configs (calendar/config/*.json).
# Variables: .env in this directory (see .env.example).
# HTTPS: nginx terminates TLS at /calendar/ → radicale:5232 (place nginx/ssl/cert.pem + key.pem; see nginx/ssl/README.txt).
# Public CalDAV base: https://<host>/calendar/  — Apple Calendar: SSL on, port 443, path /calendar/<user>/
# Copy config/*.json.example → config/<name>.json and set google-oauth-client.json (see config/README.md).
# Google OAuth first-time auth (see config/README.md if localhost fails after Allow):
#   docker compose run --rm -p 8090:8090 sync-google-astra python sync.py auth
# GCP: add redirect URIs http://127.0.0.1:8090/ and http://localhost:8090/ to the OAuth client.

x-ics-sync: &ics-sync
  build: ./sync-ics
  depends_on:
    - radicale
  restart: unless-stopped
  environment:
    SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-1800}
    RADICALE_USER: ${RADICALE_USER:-}
    RADICALE_PASSWORD: ${RADICALE_PASSWORD:-}
    RADICALE_BASE_URL: ${RADICALE_BASE_URL:-http://radicale:5232}
  command: ["/bin/sh", "/sync.sh"]

services:

  radicale:
    container_name: radicale
    image: 11notes/radicale:3
    read_only: true
    security_opt:
      - "no-new-privileges=true"
    environment:
      RADICALE_RIGHTS: |-
        [root]
        user: .+
        collection:
        permissions: R

        [principal]
        user: .+
        collection: {user}
        permissions: RW

        [calendars]
        user: .+
        collection: {user}/[^/]+
        permissions: rw
    volumes:
      - ./radicale/etc:/radicale/etc
      - ./radicale/var:/radicale/var
    # Local debug only; prefer https://<host>/calendar/ via nginx (ports 80/443).
    ports:
      - "127.0.0.1:5232:5232"
    restart: unless-stopped

  sync-astra:
    container_name: sync-astra
    build: ./sync-google
    depends_on:
      - radicale
    restart: unless-stopped
    environment:
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-1800}
      OAUTH_PORT: "8090"
      RADICALE_USER: ${RADICALE_USER:-}
      RADICALE_PASSWORD: ${RADICALE_PASSWORD:-}
      RADICALE_BASE_URL: ${RADICALE_BASE_URL:-http://radicale:5232}
    volumes:
      - ./data/sync-astra:/data
      - ./credentials/google-oauth-client.json:/credentials/google-oauth-client.json:ro

  sync-tonic:
    <<: *ics-sync
    container_name: sync-tonic
    volumes:
      - ./sync-ics/sync.sh:/sync.sh:ro
      - ./data/sync-tonic:/data

  sync-personal:
    <<: *ics-sync
    container_name: sync-personal
    volumes:
      - ./sync-ics/sync.sh:/sync.sh:ro
      - ./data/sync-personal:/data
