# Calendar stack: configure home/calendar/.env (copy from home/calendar/.env.example)
include:
  - path: calendar/compose.yaml

services:
  nginx:
    container_name: home-nginx
    image: nginx:alpine
    depends_on:
      - radicale
      - openclaw-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped

