name: calendar

x-sync-env: &sync-env
  SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-1800}
  RADICALE_USER: ${RADICALE_USER:-}
  RADICALE_PASSWORD: ${RADICALE_PASSWORD:-}
  RADICALE_BASE_URL: http://radicale:5232

x-calendar-sync: &calendar-sync
  build: ./sync
  depends_on:
    - radicale
  restart: unless-stopped
  networks:
    - default
    - mcp-net
  environment:
    <<: *sync-env

services:

  radicale:
    container_name: radicale
    image: 11notes/radicale:3
    read_only: true
    security_opt:
      - "no-new-privileges=true"
    volumes:
      - ~/.calendar/radicale/etc:/radicale/etc
      - ~/.calendar/radicale/var:/radicale/var
    ports:
      - "127.0.0.1:5232:5232"
    restart: unless-stopped

  chronos-mcp:
    container_name: chronos-mcp
    image: python:3.12-slim
    depends_on:
      - radicale
    restart: unless-stopped
    environment:
      FASTMCP_CHECK_FOR_UPDATES: "off"
    volumes:
      - ~/.calendar/chronos/accounts.json:/root/.chronos/accounts.json
    command:
      - sh
      - -c
      - >-
        apt-get update &&
        apt-get install -y --no-install-recommends git &&
        rm -rf /var/lib/apt/lists/* &&
        pip install --no-cache-dir 'git+https://github.com/democratize-technology/chronos-mcp.git' &&
        exec python -c 'from chronos_mcp.server import mcp; mcp.run(transport="sse", host="0.0.0.0", port=8000)'
    ports:
      - "8799:8000"
    networks:
      - default
      - mcp-net

  sync-personal:
    <<: *calendar-sync
    container_name: sync-personal
    volumes:
      - ~/.calendar/data/personal:/data

  sync-astra:
    <<: *calendar-sync
    container_name: sync-astra
    environment:
      <<: *sync-env
      OAUTH_PORT: "8090"
      GOOGLE_CREDENTIALS_PATH: "/credentials/google-oauth-client.json"
      GOOGLE_TOKEN_PATH: "/data/token.json"
    volumes:
      - ~/.calendar/data/astra:/data
      - ~/.calendar/credentials:/credentials:ro

  sync-tonic:
    <<: *calendar-sync
    container_name: sync-tonic
    volumes:
      - ~/.calendar/data/tonic:/data

networks:
  mcp-net:
    name: mcp-net
    driver: bridge
