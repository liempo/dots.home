## Shared reverse proxy for homestation.airplane-skilift.ts.net
##
## Endpoints:
## - https://<host>/calendar/  -> radicale:5232
## - https://<host>/openclaw/  -> openclaw-gateway:18789
## - wss://<host>/openclaw/bridge -> openclaw-gateway:18789/bridge  (no redirects; WS won't follow 301)
##
## TLS: cert.pem + key.pem in ./ssl/ (see ssl/README.txt).

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location = /calendar {
            return 301 https://$host/calendar/;
        }

        location = /openclaw {
            return 301 https://$host/openclaw/;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location = /calendar {
            return 301 https://$host/calendar/;
        }

        # Trailing / matters; proxy_pass URI strips /calendar prefix for Radicale.
        location /calendar/ {
            proxy_pass http://radicale:5232/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /calendar;
            proxy_pass_header Authorization;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
        }

        location = /openclaw {
            return 301 https://$host/openclaw/;
        }

        # NOTE: OpenClaw may or may not be fully "subpath safe".
        # This rewrite strips the /openclaw prefix before proxying.
        location /openclaw/ {
            rewrite ^/openclaw/?(.*)$ /$1 break;
            proxy_pass http://openclaw-gateway:18789;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
        }

    }
}

