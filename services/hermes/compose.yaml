name: hermes

services:
  dind:
    image: docker:27-dind
    container_name: docker
    hostname: docker
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - dind-data:/var/lib/docker
      - dind-certs:/certs
    restart: unless-stopped

  hermes:
    build: ./src
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    environment:
      TZ: Asia/Manila
      DOCKER_HOST: tcp://docker:2376
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /certs/client
    volumes:
      - ./data:/opt/data
      - ./src:/opt/hermes
      - dind-certs:/certs:ro
    depends_on:
      - dind
    mem_limit: 4g
    cpus: 2.0

volumes:
  dind-data:
  dind-certs:

